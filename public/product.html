<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - Aurora</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: #fafafa; color: #1a1a1a; }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 60px; background: white; box-shadow: 0 2px 20px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: #1a1a1a; text-decoration: none; }
        .logo span { color: #e94560; }
        .nav-links { display: flex; gap: 40px; align-items: center; }
        .nav-links a { text-decoration: none; color: #666; font-weight: 500; }
        .cart-btn { position: relative; font-size: 22px; text-decoration: none; }
        .cart-count { position: absolute; top: -6px; right: -8px; background: #e94560; color: white; font-size: 11px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 1100px; margin: 60px auto; padding: 0 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        .product-image-box { background: #f8f8f8; border-radius: 24px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 80px; position: relative; }
        .product-image-box img { width: 100%; height: 100%; object-fit: cover; }
        /* Gallery */
        .gallery-wrap { display: flex; flex-direction: column; gap: 12px; }
        .gallery-main { background: #f8f8f8; border-radius: 24px; aspect-ratio: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 80px; }
        .gallery-main img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }
        .gallery-thumbs { display: flex; gap: 10px; flex-wrap: wrap; }
        .gallery-thumb { width: 72px; height: 72px; border-radius: 10px; overflow: hidden; cursor: pointer; border: 2.5px solid transparent; flex-shrink: 0; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: border-color 0.15s; }
        .gallery-thumb:hover { border-color: #ccc; }
        .gallery-thumb.active { border-color: #e94560; }
        .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .product-details { display: flex; flex-direction: column; gap: 20px; }
        .product-badge { display: inline-block; background: #e94560; color: white; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; width: fit-content; }
        .product-details h1 { font-family: 'Playfair Display', serif; font-size: 36px; line-height: 1.2; }
        .price-row { display: flex; align-items: center; gap: 16px; }
        .price { font-size: 32px; font-weight: 700; color: #e94560; }
        .original-price { font-size: 20px; color: #999; text-decoration: line-through; }
        .discount-badge { background: #e8f5e9; color: #2e7d32; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
        .description { color: #555; line-height: 1.8; font-size: 15px; }
        .sizes-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
        .sizes { display: flex; gap: 10px; flex-wrap: wrap; }
        .size-btn { padding: 10px 18px; border: 1.5px solid #ddd; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 14px; background: white; transition: all 0.2s; }
        .size-btn:hover { border-color: #1a1a1a; }
        .size-btn.selected { background: #1a1a1a; color: white; border-color: #1a1a1a; }
        .size-btn.out { opacity: 0.4; cursor: not-allowed; text-decoration: line-through; }
        .qty-row { display: flex; align-items: center; gap: 16px; }
        .qty-row h3 { font-size: 15px; font-weight: 600; }
        .qty-controls { display: flex; align-items: center; border: 1.5px solid #ddd; border-radius: 10px; overflow: hidden; }
        .qty-controls button { width: 40px; height: 40px; background: #f5f5f5; border: none; font-size: 18px; cursor: pointer; }
        .qty-controls button:hover { background: #ddd; }
        .qty-controls span { width: 44px; text-align: center; font-weight: 600; font-size: 16px; }
        .action-btns { display: flex; gap: 12px; }
        .btn-cart { flex: 1; padding: 16px; background: #1a1a1a; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-cart:hover { background: #e94560; }
        .btn-buy { flex: 1; padding: 16px; background: #e94560; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .reviews-section { max-width: 1100px; margin: 0 auto 60px; padding: 0 40px; }
        .reviews-section h2 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 24px; }
        .review-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; border: 1px solid #eee; }
        .review-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .review-name { font-weight: 600; }
        .stars { color: #f5a623; }
        .review-title { font-weight: 600; margin-bottom: 6px; }
        .review-comment { color: #666; line-height: 1.6; }
        .footer { background: #f5f5f5; padding: 40px 60px; text-align: center; color: #999; font-size: 14px; }
        #toast { position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;padding:14px 28px;border-radius:50px;font-size:15px;font-weight:500;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none; }
        @media (max-width: 768px) {
            .nav { padding: 16px 24px; }
            .container { grid-template-columns: 1fr; padding: 0 20px; margin: 30px auto; }
            .reviews-section { padding: 0 20px; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="logo">Aurora<span>.</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="search.html">Shop</a>
            <a href="about.html">About</a>
            <a href="payment.html" class="cart-btn">🛒<span class="cart-count" id="cartCount">0</span></a>
        </div>
    </nav>

    <div class="container" id="productContainer">
        <div style="grid-column:1/-1;text-align:center;padding:80px;color:#999;">Loading...</div>
    </div>

    <div class="reviews-section" id="reviewsSection" style="display:none;">
        <h2>Customer Reviews</h2>
        <div id="reviewsList"></div>
    </div>

    <footer class="footer"><p>© 2024 Aurora. All rights reserved.</p></footer>
    <div id="toast"></div>

    <script>
        const API = 'http://localhost:5000';
        const params = new URLSearchParams(window.location.search);
        const productId = parseInt(params.get('id'));
        let product = null, selectedSize = null, quantity = 1;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.opacity = '1';
            clearTimeout(t._t); t._t = setTimeout(() => t.style.opacity = '0', 2500);
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('aurora_cart')) || [];
            document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.quantity, 0);
        }

        async function loadProduct() {
            if (!productId) { document.getElementById('productContainer').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:80px">Product not found.</div>'; return; }
            try {
                const res = await fetch(API + '/products/' + productId);
                if (!res.ok) throw new Error();
                product = await res.json();
                renderProduct(); loadReviews(); updateCartCount();
            } catch(e) {
                document.getElementById('productContainer').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:80px;color:#999;">Product not found.</div>';
            }
        }

        function renderProduct() {
            const discount = product.original_price ? Math.round((1 - product.price / product.original_price) * 100) : 0;
            document.title = product.name + ' - Aurora';

            // Build gallery
            const allImages = [];
            if (product.image) allImages.push(product.image);
            if (product.images && product.images.length) {
                product.images.forEach(img => { if (img && !allImages.includes(img)) allImages.push(img); });
            }

            const galleryHtml = allImages.length > 1 ? `
                <div class="gallery-wrap">
                    <div class="gallery-main" id="galleryMain">
                        <img id="galleryMainImg" src="${allImages[0]}" alt="${product.name}" onerror="this.parentElement.innerHTML='🛍️'">
                    </div>
                    <div class="gallery-thumbs">
                        ${allImages.map((img, i) => `
                            <div class="gallery-thumb ${i===0?'active':''}" onclick="switchGallery(this, '${img}')">
                                <img src="${img}" alt="View ${i+1}" onerror="this.parentElement.innerHTML='🛍️'">
                            </div>`).join('')}
                    </div>
                </div>` :
                `<div class="product-image-box">
                    ${product.image ? `<img src="${product.image}" alt="${product.name}" onerror="this.parentElement.innerHTML='🛍️'">` : '🛍️'}
                </div>`;

            document.getElementById('productContainer').innerHTML = `
                ${galleryHtml}
                <div class="product-details">
                    ${product.badge ? `<span class="product-badge">${product.badge}</span>` : ''}
                    <h1>${product.name}</h1>
                    <div class="price-row">
                        <span class="price">₹${product.price}</span>
                        ${product.original_price ? `<span class="original-price">₹${product.original_price}</span>` : ''}
                        ${discount > 0 ? `<span class="discount-badge">${discount}% OFF</span>` : ''}
                    </div>
                    <p class="description">${product.description || 'Premium Aurora product.'}</p>
                    ${product.sizes && product.sizes.length ? `
                    <div class="sizes-section">
                        <h3>Select Size</h3>
                        <div class="sizes">
                            ${product.sizes.map(s => {
                                const st = product.sizes_stock ? (product.sizes_stock[s] || 0) : 1;
                                return `<button class="size-btn ${st===0?'out':''}" onclick="selectSize('${s}',${st},this)">${s}</button>`;
                            }).join('')}
                        </div>
                    </div>` : ''}
                    <div class="qty-row">
                        <h3>Quantity</h3>
                        <div class="qty-controls">
                            <button onclick="changeQty(-1)">−</button>
                            <span id="qtyDisplay">1</span>
                            <button onclick="changeQty(1)">+</button>
                        </div>
                    </div>
                    <div class="action-btns">
                        <button class="btn-cart" onclick="addToCart()">Add to Cart</button>
                        <button class="btn-buy" onclick="buyNow()">Buy Now</button>
                    </div>
                    <p style="color:#888;font-size:14px;">Category: ${product.category} &nbsp;|&nbsp; ${product.stock > 0 ? product.stock+' in stock' : 'Out of stock'}</p>
                </div>`;
        }

        function selectSize(size, stock, btn) {
            if (stock === 0) return;
            selectedSize = size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function changeQty(d) {
            quantity = Math.max(1, quantity + d);
            document.getElementById('qtyDisplay').textContent = quantity;
        }

        function addToCart() {
            if (product.sizes && product.sizes.length && !selectedSize) { showToast('Please select a size!'); return; }
            let cart = JSON.parse(localStorage.getItem('aurora_cart')) || [];
            const key = product.id + (selectedSize ? '_' + selectedSize : '');
            const ex = cart.find(i => i._key === key);
            if (ex) ex.quantity += quantity;
            else cart.push({ ...product, quantity, selectedSize, _key: key });
            localStorage.setItem('aurora_cart', JSON.stringify(cart));
            updateCartCount();
            showToast('Added to cart! 🛒');
        }

        function buyNow() { addToCart(); setTimeout(() => location.href = 'payment.html', 300); }

        async function loadReviews() {
            try {
                const reviews = await (await fetch(API + '/products/' + productId + '/reviews')).json();
                const section = document.getElementById('reviewsSection');
                section.style.display = 'block';
                document.getElementById('reviewsList').innerHTML = reviews.length
                    ? reviews.map(r => `<div class="review-card"><div class="review-top"><span class="review-name">${r.customer_name}${r.verified?' ✅':''}</span><span class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span></div>${r.title?`<div class="review-title">${r.title}</div>`:''}<div class="review-comment">${r.comment||''}</div></div>`).join('')
                    : '<p style="color:#999;text-align:center;padding:30px">No reviews yet.</p>';
            } catch(e) {}
        }

        function switchGallery(thumb, src) {
            document.getElementById('galleryMainImg').src = src;
            document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
        }

        loadProduct();
    </script>
</body>
</html>
